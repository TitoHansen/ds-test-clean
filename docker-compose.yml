version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: design_system
      POSTGRES_USER: ds_user
      POSTGRES_PASSWORD: ds_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ds_user -d design_system"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
